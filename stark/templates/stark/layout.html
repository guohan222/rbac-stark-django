{% load static %}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CRM</title>
    <link rel="stylesheet" href="{% static 'stark/plugin/bootstrap-5.3.0-alpha2-dist/css/bootstrap.min.css' %}"/>
    <link rel="stylesheet" href="{% static 'stark/plugin/fontawesome-free-7.2.0-web/css/all.min.css' %}"/>
    <link rel="stylesheet" href="{% static 'stark/plugin/tom-select/css/tom-select.bootstrap5.min.css' %}">

    <link rel="stylesheet" href="{% static 'stark/css/commons.css' %}"/>
    <link rel="stylesheet" href="{% static 'stark/css/nav.css' %}"/>


    <style>
        /* 页面整体框架骨架 */
        .pg-body {
            display: flex;
            height: calc(100vh - 60px); /* 减去顶部高度 */
        }

        .left-menu {
            width: 220px;
            background-color: #ffffff;
            border-right: 1px solid #e8e8e8;
            overflow-y: auto;
        }

        .right-body {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .luffy-container {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
    </style>

    {% block css %}{% endblock %}

</head>
<body>

<header class="pg-header d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center h-100">
        <div class="logo-area d-flex align-items-center justify-content-center">
            <a href="#" class="text-decoration-none text-white fs-5 fw-bold d-flex align-items-center">
                <i class="fa-solid fa-ship me-2"></i> CRM
            </a>
        </div>
        <div class="d-flex h-100">
            <a class="nav-menu-item">资产管理</a>
            <a class="nav-menu-item">用户信息</a>
        </div>
    </div>

    <div class="d-flex align-items-center h-100 pe-4">
        <a class="nav-menu-item position-relative">
            <i class="fa-solid fa-bell me-1"></i> 通知
            <span class="position-absolute top-25 start-75 translate-middle badge rounded-pill bg-danger">4</span>
        </a>
        <div class="nav-menu-item position-relative">
            <img class="user-avatar rounded-circle border" src="{% static 'stark/imgs/default.png' %}">
            <span class="ms-2">Admin</span>
            <div class="custom-dropdown">
                <a href="#"><i class="fa-solid fa-user me-2"></i>个人信息</a>
                <a href="#"><i class="fa-solid fa-right-from-bracket me-2"></i>注销</a>
            </div>
        </div>
    </div>
</header>

<div class="pg-body">
    <aside class="left-menu">


    </aside>
    <main class="right-body">
        <nav aria-label="breadcrumb" class="mb-3 bg-white p-3 rounded shadow-sm">


        </nav>

        {% block content %}{% endblock %}

    </main>
</div>


<script src="{% static 'stark/plugin/bootstrap-5.3.0-alpha2-dist/js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'stark/plugin/tom-select/js/tom-select.complete.min.js' %}"></script>

{% block js %}{% endblock %}

</body>
</html>
